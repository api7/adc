packages:
  - apps/*
  - libs/*
autoInstallPeers: false

catalog:
  '@types/lodash-es': ^4.17.12
  '@types/semver': ^7.7.1
  axios: 1.18.1
  datum-diff: 1.0.4
  esbuild: ^0.28.1
  immer: ^11.0.0
  js-yaml: ^5.2.0
  listr2: ^10.0.0
  lodash-es: ^4.18.1
  lru-cache: ^11.0.0
  rxjs: ^7.8.2
  semver: ^7.7.4
  source-map-support: ^0.5.21
  tslib: ^2.6.2
  vitest: ^4.1.8
  zod: ^4.1.12

catalogMode: manual

minimumReleaseAge: 1440
publicHoistPattern:
  - '@types/*'

overrides:
  # NX 22.7.5 pins old versions internally
  axios: '>=1.18.1'
  tmp: '>=0.2.7'
  form-data: '>=4.0.6'
  # @trivago/prettier-plugin-sort-imports requires lodash-es@^4.17.21
  lodash-es: '>=4.17.24'
  # express transitive chain resolves to older versions
  path-to-regexp: '>=8.4.0'
  body-parser: '>=2.2.1'
  qs: '>=6.14.2'
  fast-uri: '>=3.1.2'

strictPeerDependencies: false
onlyBuiltDependencies:
  - '@parcel/watcher'
  - 'nx'
allowBuilds:
  '@parcel/watcher': false
  '@swc/core': true
  esbuild: true
  less: false
  nx: true
